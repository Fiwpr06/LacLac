events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  sendfile on;
  keepalive_timeout 65;

  # 100 req/min per IP
  limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=100r/m;

  # 1000 req/min per token header
  limit_req_zone $http_authorization zone=token_limit:10m rate=1000r/m;

  upstream auth_upstream {
    server auth-service:3001;
  }

  upstream food_upstream {
    server food-service:3002;
  }

  upstream action_upstream {
    server action-service:3003;
  }

  upstream rec_upstream {
    server rec-service:3004;
  }

  upstream media_upstream {
    server media-service:3005;
  }

  server {
    listen 80;
    server_name _;

    add_header X-App-Name "Lắc Lắc" always;

    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location /api/v1/auth/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://auth_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/foods {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://food_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/foods/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://food_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/categories {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://food_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/categories/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://food_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/actions {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://action_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/actions/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://action_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/favorites/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://action_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/reviews/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://action_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/users/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://action_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/recommendations/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://rec_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/media/ {
      limit_req zone=ip_limit burst=20 nodelay;
      limit_req zone=token_limit burst=100 nodelay;
      proxy_pass http://media_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
